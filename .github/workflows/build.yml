name: build

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Linux ────────────────────────────────────────────────────────────
  linux:
    name: linux x86_64
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake g++ \
            libx11-dev libxext-dev libxft-dev \
            libxinerama-dev libxcursor-dev libxrender-dev \
            libfreetype-dev libfontconfig-dev \
            libgl-dev

      - name: configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: build
        run: cmake --build build --parallel

      - name: package
        run: |
          mkdir dist
          cp build/ksynth-desktop dist/
          cp build/ksplay          dist/
          cp README.md GUIDE.md LICENSE dist/
          tar -czf ksynth-desktop-linux-x86_64.tar.gz -C dist .

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ksynth-desktop-linux-x86_64
          path: ksynth-desktop-linux-x86_64.tar.gz

  # ── macOS arm64 (Apple Silicon) ──────────────────────────────────────
  macos-arm64:
    name: macos arm64
    runs-on: macos-14        # macos-14 runners are Apple Silicon (M1)

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install cmake
        run: brew install cmake

      - name: configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: build
        run: cmake --build build --parallel

      - name: package
        run: |
          mkdir dist
          cp build/ksynth-desktop dist/
          cp build/ksplay          dist/
          cp README.md GUIDE.md LICENSE dist/
          tar -czf ksynth-desktop-macos-arm64.tar.gz -C dist .

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ksynth-desktop-macos-arm64
          path: ksynth-desktop-macos-arm64.tar.gz

  # ── macOS x86_64 (Intel) ─────────────────────────────────────────────
  macos-x86_64:
    name: macos x86_64
    runs-on: macos-12        # Intel

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install cmake
        run: brew install cmake

      - name: configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64

      - name: build
        run: cmake --build build --parallel

      - name: package
        run: |
          mkdir dist
          cp build/ksynth-desktop dist/
          cp build/ksplay          dist/
          cp README.md GUIDE.md LICENSE dist/
          tar -czf ksynth-desktop-macos-x86_64.tar.gz -C dist .

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ksynth-desktop-macos-x86_64
          path: ksynth-desktop-macos-x86_64.tar.gz

  # ── Windows x86_64 ───────────────────────────────────────────────────
  windows:
    name: windows x86_64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: configure
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release

      - name: build
        run: cmake --build build --config Release --parallel

      - name: package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist
          Copy-Item build\Release\ksynth-desktop.exe dist\
          Copy-Item build\Release\ksplay.exe          dist\
          Copy-Item README.md, GUIDE.md, LICENSE       dist\
          Compress-Archive -Path dist\* -DestinationPath ksynth-desktop-windows-x86_64.zip

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ksynth-desktop-windows-x86_64
          path: ksynth-desktop-windows-x86_64.zip

  # ── Release ──────────────────────────────────────────────────────────
  # Runs only on version tags (v1.0.0, v1.2.3, etc.)
  # Collects all platform artifacts and creates a GitHub release.
  release:
    name: create release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ linux, macos-arm64, macos-x86_64, windows ]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/ksynth-desktop-linux-x86_64/ksynth-desktop-linux-x86_64.tar.gz
            artifacts/ksynth-desktop-macos-arm64/ksynth-desktop-macos-arm64.tar.gz
            artifacts/ksynth-desktop-macos-x86_64/ksynth-desktop-macos-x86_64.tar.gz
            artifacts/ksynth-desktop-windows-x86_64/ksynth-desktop-windows-x86_64.zip
          body: |
            ## ksynth-desktop ${{ github.ref_name }}

            See [GUIDE.md](https://github.com/${{ github.repository }}/blob/main/GUIDE.md) for usage.

            | Platform | Download |
            |----------|---------|
            | Linux x86_64 | `ksynth-desktop-linux-x86_64.tar.gz` |
            | macOS Apple Silicon | `ksynth-desktop-macos-arm64.tar.gz` |
            | macOS Intel | `ksynth-desktop-macos-x86_64.tar.gz` |
            | Windows x86_64 | `ksynth-desktop-windows-x86_64.zip` |
